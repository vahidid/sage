name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build binaries
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          SAGE_FREE_OPENROUTER_API_KEY: ${{ secrets.SAGE_FREE_OPENROUTER_API_KEY }}
        run: |
          mkdir -p dist
          LDFLAGS="-s -w -X main.Version=${VERSION} -X main.BuiltinOpenRouterAPIKey=${SAGE_FREE_OPENROUTER_API_KEY}"
          GOOS=linux   GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/sage-linux-amd64   .
          GOOS=linux   GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o dist/sage-linux-arm64   .
          GOOS=darwin  GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/sage-darwin-amd64  .
          GOOS=darwin  GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o dist/sage-darwin-arm64  .
          GOOS=windows GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/sage-windows-amd64.exe .

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
