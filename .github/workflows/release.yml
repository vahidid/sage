name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Test
        run: go test ./...

      - name: Validate bundled FreeLLMApi config
        run: |
          test -n "$SAGE_FREE_LLM_API_KEY"
          test -n "$SAGE_FREE_LLM_API_BASE_URL"
        env:
          SAGE_FREE_LLM_API_KEY: ${{ secrets.SAGE_FREE_LLM_API_KEY }}
          SAGE_FREE_LLM_API_BASE_URL: ${{ secrets.SAGE_FREE_LLM_API_BASE_URL }}

      - name: Build binaries
        run: make release VERSION=${{ steps.version.outputs.VERSION }}
        env:
          SAGE_FREE_LLM_API_KEY: ${{ secrets.SAGE_FREE_LLM_API_KEY }}
          SAGE_FREE_LLM_API_BASE_URL: ${{ secrets.SAGE_FREE_LLM_API_BASE_URL }}

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
